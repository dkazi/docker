services:
  logguard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - logdata:/app
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://localhost:5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}        # <-- replace this
      - OPENAI_MODEL=gpt-4.1                    # or gpt-3.5-turbo

volumes:
  logdata:
